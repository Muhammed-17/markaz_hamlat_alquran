name: PHP Composer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. تهيئة إصدار الـ PHP المناسب لـ Laravel وتثبيت الإضافات الضرورية
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2' # 👈 غيرها إلى 8.3 إذا كان مشروعك يعمل على إصدار أحدث
        extensions: mbstring, dom, fileinfo, gd, zip, pdo_mysql
        coverage: none

    # 2. إنشاء ملف البيئة الافتراضي لتجنب مشاكل تشغيل Laravel
    - name: Copy .env file
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    # 3. تحديث الـ Cache إلى @v4 لحل مشكلة الـ Deprecated والتحذير نهائياً
    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v4 # 👈 تم تحديثها من v3 إلى v4
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-
    # 4. تثبيت حزم المشروع المعتمدة
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress